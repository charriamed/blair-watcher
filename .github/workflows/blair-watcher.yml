name: Blair Watcher
env:
  WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
  SINGLE_RUN: "1"
on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"  # Toutes les 5 min UTC

jobs:
  watcher:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # Timeout job 10 min

    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - run: |
        pip install --upgrade pip
        pip install -r requirements.txt
        python -m playwright install --with-deps chromium
    
    - run: python blair_status_watcher.py
      env:
        WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        SINGLE_RUN: "1"  # Variable pour 1 exécution seulement
      timeout-minutes: 8  # Timeout étape 8 min
